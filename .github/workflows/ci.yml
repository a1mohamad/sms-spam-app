name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  runtime-tests:
    name: Runtime tests
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      DB_PORT: "5432"
      POSTGRES_DB: sms_spam_test
      POSTGRES_USER: sms_spam_test
      POSTGRES_PASSWORD: test_password
      DATABASE_URL: postgresql+psycopg://sms_spam_test:test_password@localhost:5432/sms_spam_test
      MESSAGE_ENCRYPTION_KEY: ${{ secrets.MESSAGE_ENCRYPTION_KEY }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sms_spam_test
          POSTGRES_USER: sms_spam_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sms_spam_test -d sms_spam_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Apply and verify database migrations
        run: |
          alembic upgrade head
          alembic check

      - name: Run tests
        run: |
          python -m pytest
