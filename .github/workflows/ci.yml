name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  runtime-tests:
    name: Runtime tests
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      DB_PORT: "5432"
      POSTGRES_DB: sms_spam_test
      POSTGRES_USER: sms_spam_test
      POSTGRES_PASSWORD: test_password
      DATABASE_URL: postgresql+psycopg://sms_spam_test:test_password@localhost:5432/sms_spam_test
      MESSAGE_ENCRYPTION_KEY: ${{ secrets.MESSAGE_ENCRYPTION_KEY }}
      DB_CONNECT_TIMEOUT_SECONDS: "3"
      MAX_MESSAGE_LENGTH: "1000"
      MAX_REQUEST_BODY_BYTES: "16384"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sms_spam_test
          POSTGRES_USER: sms_spam_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sms_spam_test -d sms_spam_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare CI environment file
        # Compose requires the local env_file to exist even when this job only
        # validates configuration. Runtime values still come from the job env.
        run: cp .env.example .env

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Apply and verify database migrations
        run: |
          alembic upgrade head
          alembic check

      - name: Run test suite
        run: |
          python -m pytest -m "not smoke"

      - name: Run application smoke test
        run: |
          python -m pytest -m "smoke and not deployment"

  deployment-smoke:
    name: Docker Compose deployment smoke
    needs: runtime-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      COMPOSE_PROJECT_NAME: sms-spam-ci
      API_PORT: "8000"
      DB_PORT: "5432"
      POSTGRES_DB: sms_spam_container_test
      POSTGRES_USER: sms_spam_container_test
      POSTGRES_PASSWORD: test_password
      MESSAGE_ENCRYPTION_KEY: ${{ secrets.MESSAGE_ENCRYPTION_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install deployment test dependency
        run: python -m pip install pytest==9.1.1

      - name: Prepare CI environment file
        # The committed template supplies non-sensitive runtime defaults. The
        # Compose environment overrides its placeholder encryption key.
        run: cp .env.example .env

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Build deployment image
        # Both runtime services share this tag, so building it once avoids
        # duplicate API and migration builds.
        run: docker compose build --pull api

      - name: Start deployment stack
        run: docker compose up --no-build --wait --wait-timeout 180

      - name: Verify migration completed
        run: |
          migration_container="$(docker compose ps --all --quiet migrate)"
          if [ -z "$migration_container" ]; then
            echo "Migration container was not created."
            exit 1
          fi

          migration_exit_code="$(
            docker inspect --format '{{.State.ExitCode}}' "$migration_container"
          )"
          if [ "$migration_exit_code" -ne 0 ]; then
            echo "Migration exited with code $migration_exit_code."
            exit 1
          fi

      - name: Exercise deployed API
        run: >-
          python -m pytest
          --confcutdir=tests/smoke
          tests/smoke/test_compose_deployment.py
          -m "smoke and deployment"

      - name: Verify prediction persistence
        run: |
          postgres_user="$(
            docker compose exec -T postgres printenv POSTGRES_USER
          )"
          postgres_db="$(
            docker compose exec -T postgres printenv POSTGRES_DB
          )"
          prediction_count="$(
            docker compose exec -T postgres psql \
              --username "$postgres_user" \
              --dbname "$postgres_db" \
              --tuples-only \
              --no-align \
              --command "SELECT COUNT(*) FROM predictions;"
          )"
          if [ "$prediction_count" -lt 1 ]; then
            echo "The deployment smoke prediction was not persisted."
            exit 1
          fi

      - name: Show deployment logs on failure
        if: failure()
        run: docker compose logs --no-color --tail 200

      - name: Stop deployment stack
        if: always()
        # The CI project and its database volume are disposable and isolated.
        run: docker compose down --volumes --remove-orphans
